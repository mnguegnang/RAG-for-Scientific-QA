# configs/prompts.yaml
# All user-facing LLM prompts for the Scientific RAG pipeline.
# Edit this file to tune system behaviour without modifying Python source code.

generation:

  # Step 0 "Paper Focus" instruction (Fix 7).
  # Addresses "Lost in the Middle" degradation (Liu et al. 2023, arXiv:2307.03172):
  # LLMs systematically ignore evidence placed in the middle of long contexts;
  # explicitly instructing the model to anchor on the most relevant document
  # mitigates this by priming attention toward the highest-scoring passage.
  paper_focus_instruction: >-
    0. Paper Focus: First, identify which single document is most directly
    relevant to the question. Anchor your answer primarily to that document.
    Mention other documents only if they add genuinely complementary information.

  # Full RAG answer-generation prompt template.
  # Placeholders (filled by LocalLLMGenerator._build_prompt):
  #   {context_str}             — numbered [Doc N] blocks from retrieved chunks
  #   {paper_focus_instruction} — the Step 0 paper-focus instruction above
  #   {query}                   — the user's question
  rag_prompt_template: |
    You are a precise scientific AI research assistant. Answer the user's query based ONLY on the provided context.

    <Context>
    {context_str}
    </Context>

    <Instructions>
    {paper_focus_instruction}
    1. Comprehension: Read the context carefully. If the context does not contain the answer, reply exactly with: "The retrieved documents do not contain enough information to answer this." Do not guess.
    2. Chain of Thought: Provide a brief <Reasoning> section where you outline your logic based on the documents.
    3. Citations: Provide a <Final Answer> section. Every factual claim MUST end with the citation tag of the document it originated from, e.g., [Doc 1] or [Doc 2].
    </Instructions>

    <User Query>
    {query}

    <Output Format>
    <Reasoning>
    (your step-by-step thinking)
    </Reasoning>
    <Final Answer>
    (your synthesized, cited answer)
    </Final Answer>
